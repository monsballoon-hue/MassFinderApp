<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%232C3E5A'/%3E%3Crect x='40' y='10' width='20' height='80' rx='4' fill='%23B8963F'/%3E%3Crect x='14' y='30' width='72' height='20' rx='4' fill='%23B8963F'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MassFinder">
<meta name="theme-color" content="#F8F7F4" id="metaThemeColor">
<script>(function(){var t=localStorage.getItem('mf-theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');var m=document.getElementById('metaThemeColor');if(m)m.setAttribute('content','#1A1C22');}var s=localStorage.getItem('mf-text-size');if(s&&s!=='default')document.documentElement.setAttribute('data-text-size',s);})();</script>
<meta name="description" content="Find Mass, Confession, Adoration and more across Western New England">
<meta property="og:title" content="MassFinder — Catholic Services Directory">
<meta property="og:description" content="Find Mass, Confession, Adoration and more across Western New England">
<meta property="og:type" content="website">
<meta property="og:image" content="assets/icon-512.png">
<meta name="twitter:card" content="summary">
<link rel="manifest" href="manifest.json">
<title>MassFinder — Catholic Services Directory</title>
<!-- Google tag (gtag.js) — production only -->
<script>
if (location.hostname === 'massfinder.vercel.app') {
  var s = document.createElement('script');
  s.async = true;
  s.src = 'https://www.googletagmanager.com/gtag/js?id=G-0XWS7YKHED';
  document.head.appendChild(s);
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-0XWS7YKHED');
}
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<a href="#panelFind" class="skip-link">Skip to content</a>

<header class="top-header"><div class="top-header-inner"><div class="header-logo">
  <div class="header-logo-cross"><svg viewBox="0 0 16 16" fill="none"><rect x="6.5" y="1" width="3" height="14" rx="1" fill="#B8963F"/><rect x="1" y="5.5" width="14" height="3" rx="1" fill="#B8963F"/></svg></div>
  <div><div class="header-logo-text">MassFinder</div><div class="header-logo-region">Western New England</div></div>
</div></div></header>

<main id="panelFind" class="tab-panel active" role="tabpanel">
  <div id="returnCard" class="return-card-wrap" style="display:none"></div>
  <div class="search-section"><div class="search-bar" role="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="Search churches, events, or services…" aria-label="Search churches and events">
    <button id="searchClear" class="search-clear" aria-label="Clear search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div></div>

  <div id="liturgicalTeaser" class="liturgical-teaser-wrap"></div>

  <div class="chip-bar-wrap">
  <div class="chip-bar" role="toolbar" aria-label="Quick filters">
    <button class="chip active" data-filter="all">All</button>
    <button class="chip" data-filter="today">Today</button>
    <button class="chip" data-filter="weekend">This Weekend</button>
    <button class="chip season-chip" data-filter="lent" id="seasonChip" style="display:none"></button>
    <button class="chip" data-filter="confession">Confession</button>
    <button class="chip" data-filter="adoration">Adoration</button>
    <button class="chip" data-filter="latin">Latin</button>
    <button class="chip" data-filter="spanish">Spanish</button>
    <button class="chip yc-chip" data-filter="yc">YC Events</button>
    <button class="chip more-filters" id="moreFiltersBtn" onclick="openMoreFilters()">More</button>
  </div>
  </div>

  <div id="activeFilters" class="active-filters" aria-live="polite" aria-label="Active filters"></div>

  <div class="results-info">
    <span id="resultsCount" class="results-count" aria-live="polite" aria-atomic="true"></span>
    <button class="results-sort" onclick="toggleSort()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 5h10M11 9h7M11 13h4M3 17l3 3 3-3M6 18V4"/></svg>
      <span id="sortLabel">By name</span>
    </button>
  </div>

  <div id="pullIndicator" class="pull-indicator"><div class="pull-indicator-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="7 13 12 18 17 13"/><line x1="12" y1="18" x2="12" y2="6"/></svg><span id="pullText">Pull to refresh</span></div></div>
  <div id="cardList" class="card-list" role="list" aria-label="Churches">
    <div class="loading-placeholder" style="display:flex;flex-direction:column;gap:var(--space-3)">
      <div class="skel-card"><div class="skel-title"></div><div class="skel-line"></div><div class="skel-line skel-line--short"></div><div class="skel-badges"><div class="skel-badge"></div><div class="skel-badge"></div></div></div>
      <div class="skel-card" style="animation-delay:0.1s"><div class="skel-title"></div><div class="skel-line"></div><div class="skel-line skel-line--short"></div><div class="skel-badges"><div class="skel-badge"></div><div class="skel-badge"></div></div></div>
      <div class="skel-card" style="animation-delay:0.2s"><div class="skel-title"></div><div class="skel-line"></div><div class="skel-line skel-line--short"></div><div class="skel-badges"><div class="skel-badge"></div><div class="skel-badge"></div></div></div>
    </div>
  </div>
</main>

<div id="panelMap" class="tab-panel" role="tabpanel">
  <div id="mapChipBar" class="map-chip-bar">
    <button class="map-chip" data-filter="today">Today</button>
    <button class="map-chip" data-filter="confession">Confession</button>
    <button class="map-chip" data-filter="adoration">Adoration</button>
  </div>
  <div id="mapFilterPill" class="map-filter-pill" style="display:none"></div>
  <div id="mapContainer"></div>
</div>

<div id="panelSaved" class="tab-panel" role="tabpanel">
  <div class="saved-content">
    <div class="saved-header">
      <div id="savedHeaderContent">
        <h2>Your Parishes</h2>
      </div>
    </div>
    <div id="savedList" class="saved-list"></div>
  </div>
</div>

<div id="panelMore" class="tab-panel" role="tabpanel">
  <div class="more-content">

    <!-- HOLY DAY OF OBLIGATION BANNER — shown day-of and day-before -->
    <div id="hdoBanner"></div>

    <!-- Saint/celebration card -->
    <div class="more-section more-section--tight" id="saintSection">
      <div id="saintOfDayCard"><div class="saint-card"><div class="saint-feast" style="color:var(--color-text-tertiary)">Loading today's celebration…</div></div></div>
    </div>

    <!-- SEASONAL MOMENT — max 2 curated cards based on liturgical calendar (SOT-01) -->
    <div class="more-section more-section--tight" id="seasonalMoment"></div>

    <!-- DAILY READINGS — THE WORD (EMT-02-A: moved above prayer tools) -->
    <div class="more-section" id="readingsSection">
      <h2 class="more-section-title">Today's Readings</h2>
      <div id="readingsContent"><p class="reading-loading">Loading today's readings…</p></div>
    </div>

    <!-- PRAYER TOOLS — THE PRACTICE -->
    <div class="more-section more-section--tight" id="prayerToolsSection">
      <h2 class="more-section-title">Prayer &amp; Devotion</h2>
      <div class="prayer-tools-grid" id="prayerToolsGrid"></div>
      <div class="prayer-tools-secondary" id="prayerToolsSecondary"></div>
      <div id="libraryTeaser"></div>
    </div>

    <!-- DAILY FORMATION — combined Baltimore Q&A + Summa -->
    <div id="dailyFormation" class="more-section more-section--tight" style="display:none"></div>

    <!-- DEVOTIONAL GUIDES -->
    <div class="more-section">
      <h2 class="more-section-title">Grow in Faith</h2>
      <div id="devotionalCards"></div>
    </div>

    <!-- PWA INSTALL CARD — after Faith Guides -->
    <div id="moreInstallCard"></div>

    <div class="more-footer" id="moreFooter"></div>
  </div>
</div>

<div id="detailBackdrop" class="detail-backdrop" onclick="closeAllPanels()"></div>
<div id="detailPanel" class="detail-panel" role="dialog" aria-modal="true" aria-label="Church details">
  <div class="detail-handle" onclick="closeDetail()"><div class="detail-handle-bar"></div></div>
  <div id="detailContent"></div>
</div>

<div id="eventDetailPanel" class="event-detail-panel" role="dialog" aria-modal="true" aria-label="Event details">
  <div id="eventDetailContent"></div>
</div>

<div id="filtersBackdrop" class="filters-backdrop" onclick="closeMoreFilters()"></div>
<div id="filtersOverlay" class="filters-overlay" role="dialog" aria-modal="true" aria-label="Filter options">
  <div class="filters-header">
    <h2>Filters</h2>
    <button class="filters-close" onclick="closeMoreFilters()" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="filters-body" id="filtersBody"></div>
  <div class="filters-footer">
    <button class="btn-clear" onclick="clearAdvancedFilters()">Clear All</button>
    <button class="btn-apply" onclick="applyAdvancedFilters()">Apply Filters</button>
  </div>
</div>

<nav class="tab-bar" role="tablist"><div class="tab-bar-inner">
  <button class="tab-item active" data-tab="panelFind" role="tab" aria-selected="true" onclick="switchTab('panelFind',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>Find</span></button>
  <button class="tab-item" data-tab="panelMap" role="tab" aria-selected="false" onclick="switchTab('panelMap',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg><span>Map</span></button>
  <button class="tab-item" data-tab="panelSaved" role="tab" aria-selected="false" onclick="switchTab('panelSaved',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Saved</span><span id="savedTabBadge" class="tab-saved-badge" aria-hidden="true"></span></button>
  <button class="tab-item" data-tab="panelMore" role="tab" aria-selected="false" onclick="switchTab('panelMore',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg><span>More</span><span id="moreTabBadge" class="tab-more-badge" aria-hidden="true"></span></button>
</div></nav>

<!-- Universal Reader — one container for all content overlays -->
<div id="readerOverlay" class="reader-overlay" role="dialog" aria-modal="true">
  <div class="reader-header" id="readerHeader">
    <button class="reader-back-btn" id="readerBackBtn" onclick="readerBack()" aria-label="Back" style="visibility:hidden">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="20" height="20"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="reader-title" id="readerTitle"></div>
    <button class="reader-close-btn" onclick="readerClose()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="reader-header-extra" id="readerHeaderExtra" style="display:none"></div>
  <div class="reader-body" id="readerBody"></div>
  <div class="reader-footer" id="readerFooter" style="display:none"></div>
</div>

<!-- Toast -->
<div id="toast" class="mf-toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="/dist/app.min.js"></script>
</body>
</html>
