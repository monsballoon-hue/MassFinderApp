<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F8F7F4">
<title>MassFinder — Offline</title>
<style>
  :root { --primary: #2C3E5A; --accent: #B8963F; --bg: #F8F7F4; --text: #1A1E26; --muted: #5C6370; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { max-width: 380px; width: 100%; text-align: center; }
  .cross { margin: 0 auto 24px; width: 48px; height: 48px; }
  .cross rect { fill: var(--accent); }
  h1 { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  p { font-size: 1rem; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
  .available { text-align: left; background: #fff; border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; border: 1px solid #E5E2DC; }
  .available h2 { font-size: 0.875rem; font-weight: 600; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .available li { font-size: 0.9375rem; color: var(--text); padding: 6px 0; border-bottom: 1px solid #F0EDE8; list-style: none; display: flex; align-items: center; gap: 8px; }
  .available li:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #4A7C59; flex-shrink: 0; }
  button { background: var(--primary); color: #fff; border: none; border-radius: 10px; padding: 14px 28px; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; min-height: 44px; }
  button:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <svg class="cross" viewBox="0 0 48 48"><rect x="19" y="4" width="10" height="40" rx="3"/><rect x="4" y="17" width="40" height="10" rx="3"/></svg>
  <h1>You're offline</h1>
  <p>MassFinder needs a connection to load fresh data. Your cached content is still available.</p>
  <div class="available">
    <h2>Available offline</h2>
    <ul>
      <li><span class="dot"></span>Parish &amp; service listings</li>
      <li><span class="dot"></span>Favorites you've saved</li>
      <li><span class="dot"></span>Catechism paragraphs (once viewed)</li>
      <li><span class="dot"></span>Devotional guides &amp; prayers</li>
    </ul>
  </div>
  <button onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
