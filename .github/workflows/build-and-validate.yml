name: Build & Validate

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, Generate Schema, Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Validate schema template
        run: node -e "JSON.parse(require('fs').readFileSync('parish_data.schema.template.json','utf8'));console.log('✓ Schema template valid JSON')"
      - run: npm run schema
      - name: Check data JSON syntax
        run: node -e "JSON.parse(require('fs').readFileSync('parish_data.json','utf8'));console.log('✓ parish_data.json valid JSON')"
      - run: npm run validate
